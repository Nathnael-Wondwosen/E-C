services:
  - type: web
    name: ecommerce-identity-service
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=services/identity-service
    startCommand: npm run start --workspace=services/identity-service
    envVars:
      - key: NODE_ENV
        value: production
      - key: IDENTITY_SERVICE_PORT
        value: 3015
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ecommerce_platform
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: EXPOSE_PASSWORD_RESET_TOKEN
        value: false
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: ecommerce-api-gateway
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=services/api-gateway
    startCommand: npm run start --workspace=services/api-gateway
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ecommerce_platform
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: EXPOSE_PASSWORD_RESET_TOKEN
        value: false
      - key: ENFORCE_IDENTITY_BOUNDARY
        value: true
      - key: IDENTITY_SERVICE_URL
        fromService:
          name: ecommerce-identity-service
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: ecommerce-admin-dashboard
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=frontend/admin-dashboard
    startCommand: npm run start --workspace=frontend/admin-dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: ecommerce-api-gateway
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_ALLOW_MOCK_FALLBACKS
        value: false
    autoDeploy: true

  - type: web
    name: ecommerce-customer-portal
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=frontend/customer-portal
    startCommand: npm run start --workspace=frontend/customer-portal
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: ecommerce-api-gateway
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_ALLOW_MOCK_FALLBACKS
        value: false
    autoDeploy: true
